<!DOCTYPE html>
<html>
<head>
<title>HTML Lists</title>
</head>

<body>

<h2>Ordered List</h2>
<ol>
<li>Apple</li>
<li>Mango</li>
<li>Orange</li>
<li>Banana</li>
</ol>

<h2>Unordered List</h2>
<ul>
<li>Pen</li>
<li>Pencil</li>
<li>Book</li>
<li>Eraser</li>
</ul>

<h2>Description List</h2>
<dl>
<dt>HTML</dt>
<dd>Hyper Text Markup Language</dd>

<dt>CSS</dt>
<dd>Cascading Style Sheets</dd>

<dt>JavaScript</dt>
<dd>Programming language for web development</dd>
</dl>

</body>
</html>
