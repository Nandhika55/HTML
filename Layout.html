<!DOCTYPE html>
<html>
<head>
<title>HTML Layout Example</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
  }
  header, nav, section, footer {
    padding: 20px;
    text-align: center;
  }
  header {
    background-color: #f46161;
    color: white;
  }
  nav {
    background-color: #4d9d2a;
  }
  nav a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
    font-weight: bold;
  }
  section {
    background-color: #e96ac7;
    min-height: 200px;
  }
  footer {
    background-color: #264653;
    color: white;
  }
</style>
</head>

<body>

<header>
<h1>My Website</h1>
<li>Nandhika</li>
</header>

<nav>
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Services</a>
<a href="#">Contact</a>
</nav>

<section>
<h2>Main Content</h2>
<p>Welcome to my website! Here is the main section where all important content goes.</p>
</section>

<footer>
<p>Copyright &copy; 2026 My Website</p>
</footer>

</body>
</html>
